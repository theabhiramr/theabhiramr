<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERR Segmentation Fault</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #000;
        color: #fff;
        font-family: ui-monospace, "SFMono-Regular", "Cascadia Mono", Menlo, Consolas, monospace;
        font-size: 14px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #terminal { padding: 24px; flex: 1; }
      .prompt { margin-bottom: 16px; }
      .u-green  { color: #7ee787; }
      .u-red    { color: #f85149; }
      .u-blue   { color: #79c0ff; }
      .u-warn   { color: #f48771; font-weight: 600; }
      .u-dim    { color: #cccccc; }
      @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
      .cursor { animation: blink 1s infinite; }
      #btn-wrap { margin-top: 16px; display: none; }
      #home-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #333;
        background: #000;
        color: #fff;
        padding: 8px 16px;
        border-radius: 9999px;
        font-size: 14px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        user-select: none;
      }
      #home-btn:hover { background: #fff; border-color: #fff; color: #000; }
      #home-btn:active { transform: scale(0.95); }
      .arrow { font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="terminal">
      <div class="prompt">
        <span class="u-green">abhi</span><span class="u-red">@</span><span class="u-green">portfolio</span><span>:</span><span class="u-blue">~</span><span>$ ./navpage</span>
      </div>
      <div id="output"></div>
      <div id="btn-wrap">
        <a id="home-btn" href="/">Return to Home Page <span class="arrow">→</span></a>
      </div>
    </div>
    <script>
      const fullHTML =
        '<span class="u-warn">Website received signal SIGSEGV, Segmentation fault (core dumped)</span><br/>' +
        '<span class="u-dim">Aw shucks! The page you requested could not be found.<br/>' +
        'This usually means the URL is incorrect or the page has been moved.<br/><br/>' +
        'ERRNO 404 Page not found</span>';

      const plainText = fullHTML.replace(/<[^>]+>/g, '');
      const output = document.getElementById('output');
      const btnWrap = document.getElementById('btn-wrap');

      let i = 0;
      let skipped = false;
      let intervalId;

      function finish() {
        clearInterval(intervalId);
        output.innerHTML = fullHTML;
        btnWrap.style.display = 'block';
      }

      function skip() {
        if (!skipped) {
          skipped = true;
          finish();
        }
      }

      intervalId = setInterval(() => {
        if (i >= plainText.length) {
          finish();
          return;
        }
        // Render typed chars as plain text, append cursor
        const typed = document.createTextNode(plainText.slice(0, ++i));
        output.innerHTML = '';
        output.appendChild(typed);
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        cursor.textContent = '█';
        output.appendChild(cursor);
      }, 10);

      window.addEventListener('keydown', (e) => { if (e.key === 'Enter') skip(); });
      window.addEventListener('click', skip);
    </script>
  </body>
</html>
